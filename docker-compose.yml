services:
    app:
        build: .
        container_name: secure-auth-app

        command: npm run dev

        ports:
            - "3000:3000"

        env_file:
            - .env

        depends_on:
            - mongodb
            - redis

        volumes:
            - .:/app
            - /app/node_modules

    mongodb:
        image: mongo:8

        container_name: mongodb

        ports:
            - "27017:27017"

        volumes:
            - mongodb-data:/data/db

    redis:
        image: redis:8

        container_name: redis

        ports:
            - "6379:6379"

volumes:
    mongodb-data:
